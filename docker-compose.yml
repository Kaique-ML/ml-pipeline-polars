version: "3.9"
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    ports: ["5000:5000"]
    command: mlflow server --host 0.0.0.0

  api:
    build: .
    ports: ["8000:8000"]
    environment:
      MODEL_URI: "models:/demand-forecast/Production"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    command: uvicorn serving.main:app --host 0.0.0.0 --port 8000
    depends_on: [mlflow]
